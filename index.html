<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>To Do List | Stanfield Web Dev</title>
</head>
<body>
    <div class="wrapper">
        <h1>To Do List</h1>
        <div class="list">
            <div class="input">
                <input type="text" placeholder="Add a new task..." id="text-input">
                <button id="add-button">Add Task</button>
            </div>
            <ul class="tasks" id="task-list">
            </ul>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
